<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#f0c040;
  --gold2:#d4891a;
  --cream:#fff8e7;
  --deep:#0d0500;
  --rose:#ff6b6b;
  --blue:#6ec6ff;
}

html{scroll-behavior:smooth}
body{background:var(--deep);color:var(--cream);font-family:'Lato',sans-serif;overflow-x:hidden}

/* ═══ CANVAS CONFETTI ═══ */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* ═══ INTRO OVERLAY ═══ */
#intro{
  position:fixed;inset:0;z-index:9000;
  background:var(--deep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.5s ease, visibility 1.5s ease;
}
#intro.hidden{opacity:0;visibility:hidden}
.intro-text{
  font-family:'Great Vibes',cursive;
  font-size:clamp(3rem,10vw,7rem);
  background:linear-gradient(135deg,#f0c040,#fff,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s ease infinite alternate;
  text-align:center;
}
@keyframes shimmer{from{filter:brightness(1)}to{filter:brightness(1.5)}}
.intro-sub{font-size:1.1rem;color:#f0c04080;letter-spacing:0.3em;margin-top:12px;text-transform:uppercase}
.play-btn{
  margin-top:40px;padding:14px 40px;
  border:2px solid var(--gold);background:transparent;
  color:var(--gold);font-family:'Lato',sans-serif;font-size:1rem;letter-spacing:0.2em;
  cursor:pointer;text-transform:uppercase;
  transition:all 0.3s;border-radius:2px;
}
.play-btn:hover{background:var(--gold);color:var(--deep)}

/* ═══ PARTICLES ═══ */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  animation:rise linear infinite;
  opacity:0;
}
@keyframes rise{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.5}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ═══ HERO ═══ */
.hero{
  position:relative;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;overflow:hidden;padding:60px 20px;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 50%,#f0c04015 0%,transparent 60%),
    radial-gradient(ellipse at 70% 40%,#ff6b6b10 0%,transparent 60%),
    radial-gradient(ellipse at 50% 80%,#6ec6ff0a 0%,transparent 50%),
    #0d0500;
  z-index:0;
}

/* rotating ring */
.ring{
  position:absolute;border-radius:50%;
  border:1px solid var(--gold);opacity:0.15;
  animation:spin linear infinite;
}
.ring:nth-child(1){width:500px;height:500px;animation-duration:30s;border-style:dashed}
.ring:nth-child(2){width:700px;height:700px;animation-duration:45s;animation-direction:reverse;border-color:#ff6b6b}
.ring:nth-child(3){width:300px;height:300px;animation-duration:20s;border-color:#6ec6ff;border-style:dotted}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.hero-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}

.badge{
  font-size:0.75rem;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold);padding:6px 20px;
  margin-bottom:30px;opacity:0;animation:fadeUp 1s ease forwards 0.5s;
}

/* PHOTO FRAME */
.hero-frame{
  position:relative;width:min(280px,70vw);
  margin:0 auto 40px;
  opacity:0;animation:zoomIn 1.2s cubic-bezier(.17,.67,.36,1.3) forwards 0.8s;
}
@keyframes zoomIn{from{opacity:0;transform:scale(0.7) rotate(-3deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}

.hero-frame::before,.hero-frame::after{
  content:'';position:absolute;inset:-10px;
  border:1px solid var(--gold);opacity:0.5;
}
.hero-frame::before{transform:rotate(3deg)}
.hero-frame::after{transform:rotate(-3deg);inset:-18px;opacity:0.25}

.hero-photo{
  width:100%;aspect-ratio:3/4;object-fit:cover;display:block;
  filter:sepia(10%) saturate(1.2) brightness(1.05);
}

/* sparkles on frame */
.sparkle{
  position:absolute;color:var(--gold);font-size:1.2rem;
  animation:twinkle 1.5s ease-in-out infinite;
}
.sparkle:nth-child(1){top:-20px;left:10px;animation-delay:0s}
.sparkle:nth-child(2){top:-15px;right:10px;animation-delay:0.3s}
.sparkle:nth-child(3){bottom:-15px;left:20px;animation-delay:0.6s}
.sparkle:nth-child(4){bottom:-20px;right:15px;animation-delay:0.9s}
@keyframes twinkle{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

.hero-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(5rem,18vw,13rem);
  line-height:0.85;
  background:linear-gradient(135deg,#ffe066 0%,#f0c040 30%,#fff 50%,#f0c040 70%,#c8860a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px #f0c04050);
  opacity:0;animation:fadeUp 1s ease forwards 1.4s;
}

.hero-birthday{
  font-family:'Great Vibes',cursive;
  font-size:clamp(3rem,10vw,7rem);
  color:var(--cream);opacity:0;
  animation:fadeUp 1s ease forwards 1.7s;
  text-shadow:0 0 30px #f0c04040;
}

.hero-emojis{
  font-size:2rem;letter-spacing:0.3em;margin:20px 0;
  opacity:0;animation:fadeUp 1s ease forwards 2s;
}

.hero-divider{
  width:300px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),#fff,var(--gold),transparent);
  margin:20px auto;opacity:0;animation:fadeUp 1s ease forwards 2.2s;
}

.hero-wish{
  font-style:italic;font-size:clamp(1rem,2.5vw,1.3rem);font-weight:300;
  color:#f0c04099;max-width:450px;line-height:1.8;
  opacity:0;animation:fadeUp 1s ease forwards 2.4s;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ═══ SCROLL CUE ═══ */
.scroll-cue{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--gold);font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;
  opacity:0;animation:fadeUp 1s ease forwards 3s;
  z-index:2;
}
.scroll-arrow{animation:bounce 1.5s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* ═══ TIMELINE / GALLERY ═══ */
.journey{padding:100px 20px;max-width:1200px;margin:0 auto}

.sec-header{text-align:center;margin-bottom:80px}
.sec-label{
  font-size:0.75rem;letter-spacing:0.5em;text-transform:uppercase;
  color:var(--gold);margin-bottom:16px;
}
.sec-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.5rem,6vw,4.5rem);
  color:var(--cream);
  line-height:1;
}
.sec-title em{color:var(--gold);font-style:italic}
.sec-line{
  width:60px;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);
  margin:20px auto 0;
}

/* FILM STRIP */
.filmstrip{
  display:flex;gap:0;overflow:hidden;margin-bottom:40px;
  border-top:8px solid #111;border-bottom:8px solid #111;
  position:relative;
}
.filmstrip::before,.filmstrip::after{
  content:'';position:absolute;top:0;bottom:0;width:40px;
  background:linear-gradient(to right,var(--deep),transparent);
  z-index:2;
}
.filmstrip::after{right:0;left:auto;background:linear-gradient(to left,var(--deep),transparent)}

.film-track{
  display:flex;gap:4px;
  animation:scroll-film 20s linear infinite;
  width:max-content;
}
.film-track:hover{animation-play-state:paused}

@keyframes scroll-film{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.film-item{
  width:200px;height:180px;flex-shrink:0;overflow:hidden;position:relative;
}
.film-item::before,.film-item::after{
  content:'';position:absolute;left:0;right:0;height:14px;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 12px,var(--deep) 12px,var(--deep) 18px);
  z-index:2;
}
.film-item::before{top:0}
.film-item::after{bottom:0}
.film-item img{width:100%;height:100%;object-fit:cover;filter:sepia(20%);transition:filter 0.3s}
.film-item:hover img{filter:sepia(0%) saturate(1.3)}

/* MASONRY GRID */
.masonry{
  columns:3;column-gap:16px;
  margin-top:60px;
}
@media(max-width:700px){.masonry{columns:2}}
@media(max-width:400px){.masonry{columns:1}}

.mason-item{
  break-inside:avoid;margin-bottom:16px;position:relative;overflow:hidden;
  opacity:0;transform:translateY(50px) scale(0.95);
  transition:opacity 0.8s ease, transform 0.8s ease;
}
.mason-item.visible{opacity:1;transform:translateY(0) scale(1)}

.mason-item img{width:100%;display:block;filter:saturate(0.9) brightness(0.95);transition:all 0.5s ease}
.mason-item:hover img{filter:saturate(1.2) brightness(1.1);transform:scale(1.04)}

.mason-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,#0d050099 0%,transparent 50%);
  pointer-events:none;
}
.mason-label{
  position:absolute;bottom:12px;left:14px;right:14px;
  font-style:italic;font-size:0.9rem;color:var(--gold);
  opacity:0;transform:translateY(8px);
  transition:all 0.4s ease;
}
.mason-item:hover .mason-label{opacity:1;transform:translateY(0)}

/* gold corners on hover */
.mason-item::before,.mason-item::after{
  content:'';position:absolute;width:20px;height:20px;
  border-color:var(--gold);border-style:solid;
  opacity:0;transition:opacity 0.3s;z-index:3;
}
.mason-item::before{top:8px;left:8px;border-width:2px 0 0 2px}
.mason-item::after{bottom:8px;right:8px;border-width:0 2px 2px 0}
.mason-item:hover::before,.mason-item:hover::after{opacity:1}

/* ═══ MESSAGE CARD ═══ */
.message-section{
  padding:100px 20px;
  background:linear-gradient(135deg,#1a0a0080 0%,#0d050080 100%);
  text-align:center;position:relative;overflow:hidden;
}
.message-section::before{
  content:'🎂';font-size:20rem;position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  opacity:0.03;pointer-events:none;
}

.message-card{
  max-width:700px;margin:0 auto;
  border:1px solid #f0c04030;padding:60px 40px;
  position:relative;background:#0d050060;backdrop-filter:blur(10px);
}
.message-card::before,.message-card::after{
  content:'✦';position:absolute;color:var(--gold);font-size:1.5rem;
  animation:twinkle 2s ease infinite;
}
.message-card::before{top:16px;left:20px}
.message-card::after{bottom:16px;right:20px;animation-delay:1s}

.msg-title{
  font-family:'Great Vibes',cursive;font-size:clamp(2rem,6vw,4rem);
  color:var(--gold);margin-bottom:30px;
}
.msg-body{
  font-size:clamp(1rem,2vw,1.2rem);font-weight:300;line-height:2;
  color:var(--cream);opacity:0.9;
}
.msg-body strong{color:var(--gold)}
.msg-hindi{
  margin-top:30px;
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.3rem,3vw,2rem);color:var(--gold);
}

/* ═══ FIREWORKS SECTION ═══ */
.final-section{
  padding:80px 20px 120px;text-align:center;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,#f0c04008 0%,transparent 60%);
}
.final-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(4rem,15vw,10rem);
  background:linear-gradient(135deg,#ffe066,#f0c040,#fff,#f0c040,#ffe066);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradMove 3s ease infinite;
  filter:drop-shadow(0 0 30px #f0c04060);
}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.emoji-burst{font-size:3rem;letter-spacing:0.4em;margin:20px 0;display:flex;justify-content:center;flex-wrap:wrap;gap:10px}
.emoji-burst span{display:inline-block;animation:popIn 0.5s cubic-bezier(.17,.67,.36,1.5) backwards}

@keyframes popIn{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}

/* ═══ MUSIC PLAYER ═══ */
.music-bar{
  position:fixed;bottom:20px;right:20px;z-index:1000;
  background:#1a0f00ee;border:1px solid var(--gold);
  padding:12px 20px;border-radius:40px;
  display:flex;align-items:center;gap:12px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px #f0c04030;
  cursor:pointer;
  transition:all 0.3s;
}
.music-bar:hover{background:#2d1f00;transform:scale(1.05)}
.music-icon{font-size:1.3rem;animation:spin 4s linear infinite}
.music-label{font-size:0.8rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase}
.music-waves{display:flex;gap:3px;align-items:center}
.music-waves span{
  width:3px;background:var(--gold);border-radius:2px;
  animation:wave 0.8s ease infinite;
}
.music-waves span:nth-child(1){height:8px;animation-delay:0s}
.music-waves span:nth-child(2){height:14px;animation-delay:0.1s}
.music-waves span:nth-child(3){height:20px;animation-delay:0.2s}
.music-waves span:nth-child(4){height:14px;animation-delay:0.3s}
.music-waves span:nth-child(5){height:8px;animation-delay:0.4s}
@keyframes wave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1.2)}}
.music-waves.paused span{animation-play-state:paused}

/* gold strip */
.gold-strip{width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--gold),#fff,var(--gold),transparent);margin-top:60px}

</style>
</head>

<canvas id="confetti-canvas"></canvas>
<div id="particles"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">Happy Birthday</div>
  <div class="intro-sub">✦ A Special Celebration ✦</div>

</div>

<!-- MUSIC PLAYER -->
<div class="music-bar" id="musicBar" onclick="toggleMusic()" style="display:none">
  <span class="music-icon">🎵</span>
  <span class="music-label">Birthday Song</span>
  <div class="music-waves" id="musicWaves">

  </div>
</div>
